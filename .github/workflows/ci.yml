name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Pytest
        env:
          MARLINSPIKE_ALLOW_NO_DATABASE_URL: "true"
          MARLINSPIKE_ALLOW_GENERATED_SECRET: "true"
        run: python -m pytest tests/ -q
      - name: Smoke imports
        env:
          MARLINSPIKE_ALLOW_NO_DATABASE_URL: "true"
          MARLINSPIKE_ALLOW_GENERATED_SECRET: "true"
        run: |
          python -c "from marlinspike import create_app, db, __version__; print(__version__)"
          python -c "from marlinspike import taxonomy, run_store, recovery; print('ok')"
      - name: Lint (ruff — strict on new modules, warn-only on legacy)
        run: |
          python -m pip install ruff
          # New code: failures fatal.
          ruff check \
            marlinspike/emit/ \
            marlinspike/setup_wizard.py \
            marlinspike/recovery.py \
            marlinspike/run_store.py \
            marlinspike/taxonomy.py \
            tests/test_ocsf_emit.py tests/test_navigator_emit.py tests/test_stix_emit.py \
            tests/test_sigma_emit.py tests/test_recovery.py tests/test_run_store.py \
            tests/test_taxonomy.py tests/test_security_v352.py
          # Legacy giants warn-only (split tracked for v3.6+).
          ruff check --no-fix marlinspike/app.py marlinspike/engine.py || true
      - name: Type check (mypy — strict on new modules)
        env:
          MARLINSPIKE_ALLOW_NO_DATABASE_URL: "true"
          MARLINSPIKE_ALLOW_GENERATED_SECRET: "true"
        run: |
          python -m pip install mypy types-PyYAML types-requests
          # Run strict mypy against the new modules only. Legacy app.py /
          # engine.py are excluded per pyproject.toml [tool.mypy] config
          # (will be typed in v3.6+ split).
          mypy --config-file pyproject.toml \
            marlinspike/taxonomy.py \
            marlinspike/run_store.py \
            marlinspike/recovery.py \
            marlinspike/setup_wizard.py \
            marlinspike/emit/ || true
          # Above is warn-only for now; flip to fatal once new annotations
          # are tightened in the next sweep.
      - name: Coverage report (pytest-cov)
        env:
          MARLINSPIKE_ALLOW_NO_DATABASE_URL: "true"
          MARLINSPIKE_ALLOW_GENERATED_SECRET: "true"
        run: |
          python -m pip install pytest-cov
          pytest --cov=marlinspike --cov-report=term-missing --cov-report=xml -q || true
          # Coverage report uploaded as artifact; gate threshold pending
          # baseline measurement (set in v3.5.5 once we know the floor).
