# A generic, single database configuration.
# Flask-Migrate manages the sqlalchemy.url at runtime via env.py;
# the value here is only used when running alembic CLI directly.

[alembic]
# path to migration scripts (relative to this file)
script_location = migrations

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# sys.path modification
prepend_sys_path = .
path_separator = os

# Timezone for %%now variable in file_template
timezone = UTC

# truncate slug to this length
truncate_slug_length = 40

# Allow --autogenerate to compare column types
compare_type = true

# version_locations (default: %(script_location)s/versions)
# Leave unset to use the default.

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
